<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepSeek Chat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #16213e;
      padding: 16px 20px;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #e94560;
    }

    .api-key-input {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .api-key-input input {
      background: #0f3460;
      border: 1px solid #1a1a2e;
      color: #eee;
      padding: 8px 12px;
      border-radius: 6px;
      width: 280px;
      font-size: 13px;
    }

    .api-key-input input:focus {
      outline: none;
      border-color: #e94560;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: #e94560;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: #16213e;
      border: 1px solid #0f3460;
      border-bottom-left-radius: 4px;
    }

    .message.error {
      background: #4a1a1a;
      border-color: #6b2a2a;
      color: #ff8080;
    }

    .input-area {
      background: #16213e;
      padding: 16px 20px;
      border-top: 1px solid #0f3460;
      display: flex;
      gap: 12px;
    }

    .input-area textarea {
      flex: 1;
      background: #0f3460;
      border: 1px solid #1a1a2e;
      color: #eee;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 48px;
      max-height: 150px;
    }

    .input-area textarea:focus {
      outline: none;
      border-color: #e94560;
    }

    .input-area button {
      background: #e94560;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-area button:hover {
      background: #d63850;
    }

    .input-area button:disabled {
      background: #4a4a5a;
      cursor: not-allowed;
    }

    .typing {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
    }

    .typing span {
      width: 8px;
      height: 8px;
      background: #e94560;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing span:nth-child(1) { animation-delay: -0.32s; }
    .typing span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    .welcome {
      text-align: center;
      color: #666;
      margin-top: 100px;
    }

    .welcome h2 {
      font-size: 24px;
      color: #888;
      margin-bottom: 8px;
    }

    .welcome p {
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>DeepSeek Chat</h1>
    <div class="api-key-input">
      <input type="password" id="apiKey" placeholder="Enter DeepSeek API Key...">
    </div>
  </div>

  <div class="chat-container" id="chatContainer">
    <div class="welcome">
      <h2>Welcome to DeepSeek Chat</h2>
      <p>Enter your API Key to start chatting</p>
    </div>
  </div>

  <div class="input-area">
    <textarea id="messageInput" placeholder="Type a message... (Enter to send, Shift+Enter for new line)" rows="1"></textarea>
    <button id="sendBtn">Send</button>
  </div>

  <script>
    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const apiKeyInput = document.getElementById('apiKey');

    let messages = [];
    let isLoading = false;

    // Load saved API Key
    const savedKey = localStorage.getItem('deepseek_api_key');
    if (savedKey) apiKeyInput.value = savedKey;

    // Save API Key
    apiKeyInput.addEventListener('change', () => {
      localStorage.setItem('deepseek_api_key', apiKeyInput.value);
    });

    // Auto-resize input height
    messageInput.addEventListener('input', () => {
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 150) + 'px';
    });

    // Send message
    async function sendMessage() {
      const apiKey = apiKeyInput.value.trim();
      const content = messageInput.value.trim();

      if (!apiKey) {
        alert('Please enter your API Key first');
        apiKeyInput.focus();
        return;
      }

      if (!content || isLoading) return;

      // Clear welcome message
      const welcome = chatContainer.querySelector('.welcome');
      if (welcome) welcome.remove();

      // Add user message
      addMessage('user', content);
      messages.push({ role: 'user', content });

      messageInput.value = '';
      messageInput.style.height = 'auto';

      // Show loading state
      isLoading = true;
      sendBtn.disabled = true;
      const typingEl = document.createElement('div');
      typingEl.className = 'message assistant typing';
      typingEl.innerHTML = '<span></span><span></span><span></span>';
      chatContainer.appendChild(typingEl);
      scrollToBottom();

      try {
        const response = await window.api.chat(apiKey, messages);
        typingEl.remove();
        addMessage('assistant', response);
        messages.push({ role: 'assistant', content: response });
      } catch (error) {
        typingEl.remove();
        addMessage('error', 'Error: ' + error);
      }

      isLoading = false;
      sendBtn.disabled = false;
      messageInput.focus();
    }

    function addMessage(type, content) {
      const div = document.createElement('div');
      div.className = `message ${type === 'error' ? 'assistant error' : type}`;
      div.textContent = content;
      chatContainer.appendChild(div);
      scrollToBottom();
    }

    function scrollToBottom() {
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    sendBtn.addEventListener('click', sendMessage);

    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    messageInput.focus();
  </script>
</body>
</html>
